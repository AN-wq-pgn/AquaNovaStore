<body>

    <body class="body-registro">

        <form action="registro.php" method="POST" class="form-registro">

            <h2 class="titulo-registro">Crear cuenta</h2>

            <input type="text" name="nombre_empresa" placeholder="Empresa" class="input-reg" required>
            <input type="email" name="correo" placeholder="Correo" class="input-reg" required>
            <input type="password" name="password" placeholder="Contraseña" class="input-reg" required>

            <input type="tel" name="telefono" placeholder="Teléfono" class="input-reg" required>
            <input type="text" name="direccion" placeholder="Dirección" class="input-reg" required>
            <input type="text" name="rfc" placeholder="RFC" class="input-reg" required>

            <button type="submit" class="btn-reg">Registrarse</button>

        </form>

    </body>
